name: entity_graph_flutter
description: >
  Flutter/Dart mirror of the Prometheus entity graph — normalized, reactive
  entity store with Riverpod 3 AsyncNotifier providers, Freezed immutable
  models, and a transport registry whose contract mirrors the SDL.
version: 3.0.0-alpha.0
homepage: https://github.com/Prometheus-AGS/prometheus-entity-management

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  # Riverpod 3 with codegen
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5
  # Freezed for immutable models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Riverpod + Freezed code generation
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  # Linting
  flutter_lints: ^4.0.0

flutter:
  # Library package — no assets or fonts needed.
