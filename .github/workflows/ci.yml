name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  library-and-examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck (library)
        run: pnpm run typecheck

      - name: Build library
        run: pnpm run build

      - name: Test
        run: pnpm run test

      - name: Verify skills ↔ exports ledger
        run: pnpm run verify:skills

      - name: Typecheck (Vite example)
        run: pnpm run typecheck:vite

      - name: Typecheck (Next.js example)
        run: pnpm run typecheck:next
