name: Publish

on:
  push:
    branches: [main]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Check if version already published
        id: version-check
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          PKG_NAME=$(node -p "require('./package.json').name")
          echo "version=$PKG_VERSION" >> $GITHUB_OUTPUT
          if npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null | grep -q "${PKG_VERSION}"; then
            echo "already_published=true" >> $GITHUB_OUTPUT
            echo "Version ${PKG_VERSION} already exists on npm — skipping publish."
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
            echo "Version ${PKG_VERSION} not yet published — will publish."
          fi

      - name: Typecheck
        if: steps.version-check.outputs.already_published == 'false'
        run: pnpm run typecheck

      - name: Build
        if: steps.version-check.outputs.already_published == 'false'
        run: pnpm run build

      - name: Test
        if: steps.version-check.outputs.already_published == 'false'
        run: pnpm run test

      - name: Verify skills exports ledger
        if: steps.version-check.outputs.already_published == 'false'
        run: pnpm run verify:skills

      - name: Publish to npm
        if: steps.version-check.outputs.already_published == 'false'
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
